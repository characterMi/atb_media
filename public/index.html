<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="description"
    content="A YouTube clone created using the YouTube api. With the ability to search for videos and playing it straight from the app." />
  <meta name="theme-color" content="#000000" />
  <meta name="color-scheme" content="dark" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=yes" />
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/atb_media/sw.js");
    }

    const isStandAlone =
      window.matchMedia("(display-mode: standalone)").matches ||
      window.navigator.standalone === true;

    if (isStandAlone) {
      const viewportMeta = document.querySelector('meta[name="viewport"]');

      viewportMeta?.setAttribute(
        "content",
        viewportMeta?.content.replace("user-scalable=yes", "user-scalable=no")
      );
    }
  </script>
  <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/logo.svg" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/images/atb-media_192.png" />
  <link rel="manifest" href="%PUBLIC_URL%/app.webmanifest" />
  <title>ATB Media</title>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <main id="root"></main>
</body>

</html>
